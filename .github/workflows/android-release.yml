name: Android Release Build

on:
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-24.04

    env:
      ANDROID_KEYSTORE_PATH: frontend/android/boai-release.jks
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Validate signing secrets
        shell: bash
        run: |
          test -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}"
          test -n "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
          test -n "${{ secrets.ANDROID_KEY_ALIAS }}"
          test -n "${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Restore keystore
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > frontend/android/boai-release.jks

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Ensure Android SDK packages
        shell: bash
        run: |
          SDK_ROOT="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          if [ -z "$SDK_ROOT" ]; then
            echo "ANDROID_HOME or ANDROID_SDK_ROOT is not set"
            exit 1
          fi

          SDKMANAGER="$(find "$SDK_ROOT" -name sdkmanager | head -n 1)"
          if [ -z "$SDKMANAGER" ]; then
            echo "sdkmanager not found under $SDK_ROOT"
            exit 1
          fi

          yes | "$SDKMANAGER" --licenses > /dev/null || true
          "$SDKMANAGER" "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Prepare Android assets
        working-directory: frontend
        run: npm run android:prepare

      - name: Build signed release APK and AAB
        working-directory: frontend/android
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease --stacktrace

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: boai-music-release-build
          path: |
            frontend/android/app/build/outputs/apk/release/app-release.apk
            frontend/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
