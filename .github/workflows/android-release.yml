name: Android Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Ensure Android SDK packages
        shell: bash
        run: |
          SDK_ROOT="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          if [ -z "$SDK_ROOT" ]; then
            echo "ANDROID_HOME or ANDROID_SDK_ROOT is not set"
            exit 1
          fi

          SDKMANAGER="$(find "$SDK_ROOT" -name sdkmanager | head -n 1)"
          if [ -z "$SDKMANAGER" ]; then
            echo "sdkmanager not found under $SDK_ROOT"
            exit 1
          fi

          yes | "$SDKMANAGER" --licenses > /dev/null || true
          "$SDKMANAGER" "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Prepare Android assets
        working-directory: frontend
        run: npm run android:prepare

      - name: Decode signing keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 is not configured"
            exit 1
          fi
          KEYSTORE_PATH="$RUNNER_TEMP/boai-release.jks"
          CLEAN_BASE64="$(printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d '\r\n\t ')"
          CLEAN_BASE64="${CLEAN_BASE64#ANDROID_KEYSTORE_BASE64=}"
          printf '%s' "$CLEAN_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          echo "ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"

      - name: Build release APK and AAB
        working-directory: frontend/android
        shell: bash
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease --stacktrace

      - name: Get version from package.json
        id: get_version
        working-directory: frontend
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "apk_name=boai-music-v$VERSION-release.apk" >> $GITHUB_OUTPUT
          echo "aab_name=boai-music-v$VERSION-release.aab" >> $GITHUB_OUTPUT

      - name: Prepare release assets
        shell: bash
        run: |
          cp "frontend/android/app/build/outputs/apk/release/app-release.apk" "frontend/android/app/build/outputs/apk/release/${{ steps.get_version.outputs.apk_name }}"
          cp "frontend/android/app/build/outputs/bundle/release/app-release.aab" "frontend/android/app/build/outputs/bundle/release/${{ steps.get_version.outputs.aab_name }}"
          cat > frontend/android/app/build/outputs/apk/release/update.json <<EOF
          {
            "versionCode": $(node -e "const v=require('./frontend/package.json').version.split('.').map(n=>parseInt(n||'0',10)); while(v.length<3)v.push(0); process.stdout.write(String(v[0]*10000+v[1]*100+v[2]))"),
            "versionName": "${{ steps.get_version.outputs.version }}",
            "apkUrl": "https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.tag }}/${{ steps.get_version.outputs.apk_name }}"
          }
          EOF

      - name: Publish stable update manifest to repository
        shell: bash
        run: |
          mkdir -p app-updates
          cp "frontend/android/app/build/outputs/apk/release/update.json" "app-updates/update.json"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app-updates/update.json
          if ! git diff --cached --quiet; then
            git commit -m "Update app manifest for v${{ steps.get_version.outputs.version }}"
            git push
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/android/app/build/outputs/apk/release/${{ steps.get_version.outputs.apk_name }}
            frontend/android/app/build/outputs/bundle/release/${{ steps.get_version.outputs.aab_name }}
            frontend/android/app/build/outputs/apk/release/update.json
          name: Release ${{ steps.get_version.outputs.version }}
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || steps.get_version.outputs.tag }}
          generate_release_notes: true
          overwrite_files: true
          make_latest: true
          target_commitish: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: boai-music-release-build
          path: |
            frontend/android/app/build/outputs/apk/release/${{ steps.get_version.outputs.apk_name }}
            frontend/android/app/build/outputs/bundle/release/${{ steps.get_version.outputs.aab_name }}
            frontend/android/app/build/outputs/apk/release/update.json
          if-no-files-found: error
