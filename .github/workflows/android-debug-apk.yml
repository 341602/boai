name: Android Debug APK

on:
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Ensure Android SDK packages
        shell: bash
        run: |
          SDK_ROOT="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          if [ -z "$SDK_ROOT" ]; then
            echo "ANDROID_HOME or ANDROID_SDK_ROOT is not set"
            exit 1
          fi

          SDKMANAGER="$(find "$SDK_ROOT" -name sdkmanager | head -n 1)"
          if [ -z "$SDKMANAGER" ]; then
            echo "sdkmanager not found under $SDK_ROOT"
            exit 1
          fi

          yes | "$SDKMANAGER" --licenses > /dev/null || true
          "$SDKMANAGER" "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Prepare Android assets
        working-directory: frontend
        run: npm run android:prepare

      - name: Build debug APK
        working-directory: frontend/android
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: boai-music-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
